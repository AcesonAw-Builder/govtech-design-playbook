<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a54a4"/>

  <!-- Decorative stripe (SG red accent) -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="#0d3880"/>
  <rect x="0" y="392" width="512" height="16" rx="0" fill="#e8472a" opacity="0.9"/>

  <!-- Monogram "GP" -->
  <text
    x="256"
    y="300"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="200"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-8"
  >GP</text>

  <!-- Subtitle label -->
  <text
    x="256"
    y="460"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="44"
    font-weight="500"
    text-anchor="middle"
    fill="rgba(255,255,255,0.75)"
    letter-spacing="4"
  >PLAYBOOK</text>
